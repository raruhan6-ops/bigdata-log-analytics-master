# =============================================================================
# Flume 配置：Kafka → HDFS（Docker 版本）
# 将 Kafka 中的原始日志持久化到 HDFS，供 Hive 外部表读取
#
# 启动（容器内）: flume-ng agent -n a1 -c conf -f conf/kafka-hdfs.conf
# =============================================================================

a2.sources  = s1
a2.channels = c1
a2.sinks    = k1

# ---------- Source: Kafka ----------
a2.sources.s1.type = org.apache.flume.source.kafka.KafkaSource
a2.sources.s1.kafka.bootstrap.servers = kafka:9092
a2.sources.s1.kafka.topics = log_raw
a2.sources.s1.kafka.consumer.group.id = flume_hdfs_consumer
a2.sources.s1.batchSize = 5000
a2.sources.s1.kafka.consumer.auto.offset.reset = earliest

# ---------- Channel: Memory ----------
a2.channels.c1.type = memory
a2.channels.c1.capacity = 100000
a2.channels.c1.transactionCapacity = 10000

# ---------- Sink: HDFS ----------
a2.sinks.k1.type = hdfs
a2.sinks.k1.hdfs.path = hdfs://namenode:9000/data/log_dw/ods/access_log/dt=%Y-%m-%d
a2.sinks.k1.hdfs.filePrefix = access
a2.sinks.k1.hdfs.fileSuffix = .log
a2.sinks.k1.hdfs.rollInterval = 30
a2.sinks.k1.hdfs.rollSize = 134217728
a2.sinks.k1.hdfs.rollCount = 50000
a2.sinks.k1.hdfs.batchSize = 1000
a2.sinks.k1.hdfs.fileType = DataStream
a2.sinks.k1.hdfs.writeFormat = Text
a2.sinks.k1.hdfs.useLocalTimeStamp = true
# 避免 under-replication 触发的频繁文件轮转
a2.sinks.k1.hdfs.minBlockReplicas = 1
a2.sinks.k1.hdfs.maxConsecutiveFailures = 50

a2.sources.s1.channels = c1
a2.sinks.k1.channel = c1
