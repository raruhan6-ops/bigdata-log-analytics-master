# =============================================================================
# Flume 配置：实时采集 Nginx 日志 → Kafka（Docker 版本）
#
# 架构: Taildir Source → File Channel → Kafka Sink
# 网络: 所有地址使用 Docker 内部 service name
#
# 启动（容器内）: flume-ng agent -n a1 -c conf -f conf/taildir-kafka.conf
# =============================================================================

# ---------- Agent ----------
a1.sources  = s1
a1.channels = c1
a1.sinks    = k1

# ---------- Source: Taildir（断点续传，读宿主机挂载的日志）----------
a1.sources.s1.type = taildir
a1.sources.s1.filegroups = f1
a1.sources.s1.filegroups.f1 = /data/logs/access.*.log
a1.sources.s1.positionFile = /opt/flume/taildir_position.json
a1.sources.s1.batchSize = 1000
a1.sources.s1.maxBatchCount = 10

# ---------- Channel: File（保证不丢数据）----------
a1.channels.c1.type = file
a1.channels.c1.capacity = 1000000
a1.channels.c1.transactionCapacity = 10000
a1.channels.c1.checkpointDir = /opt/flume/file_channel_cp
a1.channels.c1.dataDirs = /opt/flume/file_channel_data

# ---------- Sink: Kafka ----------
a1.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
a1.sinks.k1.kafka.topic = log_raw
a1.sinks.k1.kafka.bootstrap.servers = kafka:9092
a1.sinks.k1.kafka.producer.acks = 1
a1.sinks.k1.kafka.producer.compression.type = snappy
a1.sinks.k1.flumeBatchSize = 1000

# ---------- 绑定 ----------
a1.sources.s1.channels = c1
a1.sinks.k1.channel = c1
